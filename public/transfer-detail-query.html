   //执行查询
   function performQuery() {
    // 获取所有筛选条件
    const filters = {
     startMonth: document.getElementById('startMonthSelect').value,
     endMonth: document.getElementById('endMonthSelect').value,
     idCard: document.getElementById('idCardInput').value.trim(),
     name: document.getElementById('nameInput').value.trim().toLowerCase(),
     minAge: document.getElementById('minAgeInput').value ? parseInt(document.getElementById('minAgeInput').value) : null,
     maxAge: document.getElementById('maxAgeInput').value ? parseInt(document.getElementById('maxAgeInput').value) : null,
     district: document.getElementById('districtSelect').value, 
     town: document.getElementById('townSelect').value, 
     hospitalLevel: document.getElementById('hospitalLevelSelect').value,
     hospitalName: document.getElementById('hospitalNameInput').value.toLowerCase(),
     icdCategory: document.getElementById('icdCategorySelect').value,
     icdSubcategory: document.getElementById('icdSubcategorySelect').value,
     countyTransfer: document.getElementById('countyTransferCheck').checked,
     cityTransfer: document.getElementById('cityTransferCheck').checked
    };
    
    // 筛选数据
    state.filteredData = mockData.filter(item => {
     // 身份证号筛选
     if (filters.idCard) {
      if (filters.idCard.length === 4) {
       // 后四位匹配
       if (!item.idCard.endsWith(filters.idCard)) {
        return false;
       }
      } else {
       // 完整号码匹配
       if (item.idCard.replace(/\*/g, '') !== filters.idCard.replace(/\*/g, '')) {
        return false;
       }
      }
     }
     
     // 姓名筛选
     if (filters.name && !item.name.toLowerCase().includes(filters.name)) {
      return false;
     }
     
     // 年龄范围筛选
     if (filters.minAge !== null && item.age < filters.minAge) {
      return false;
     }
     if (filters.maxAge !== null && item.age > filters.maxAge) {
      return false;
     }
     
     // 医疗机构名称筛选
     if (filters.hospitalName && !item.hospital.toLowerCase().includes(filters.hospitalName)) {
      return false;
     }
     
     return true;
    });
    
    // 更新总记录数
    state.totalItems = state.filteredData.length;
    document.getElementById('totalCount').textContent = `共 ${state.totalItems} 条记录`;
    
    // 重置页码
    state.currentPage = 1;
    document.getElementById('currentPageInput').value = 1;
    
    // 应用搜索
    applySearch();
    
    // 渲染表格数据
    renderTableData();
    
    // 更新分页信息
    updatePaginationInfo();
   }
   
   //初始化表格排序事件
   function initTableSorting() {
    const sortHeaders = document.querySelectorAll('th[data-sort]');
    
    sortHeaders.forEach(header => {
     header.addEventListener('click', function() {
      const field = this.getAttribute('data-sort');
      
      // 如果点击同一字段，则切换排序方向
      if (state.sortField === field) {
       state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
       // 否则，设置新的排序字段并默认升序
       state.sortField = field;
       state.sortDirection = 'asc';
      }
      
      // 重新渲染表格
      renderTableData();
      
      // 更新排序图标
      updateSortIcons();
     });
    });
   }
   
   // 更新排序图标
   function updateSortIcons() {
    // 重置所有排序图标
    document.querySelectorAll('th[data-sort] .sort-icon').forEach(icon => {
     icon.className = 'fas fa-sort sort-icon';
    });
    
    // 如果有排序字段，更新对应图标
    if (state.sortField) {
     const header = document.querySelector(`th[data-sort="${state.sortField}"] .sort-icon`);
     if (header) {
      header.className = state.sortDirection === 'asc' 
       ? 'fas fa-sort-up sort-icon sort-active' 
       : 'fas fa-sort-down sort-icon sort-active'; 
     }
    }
   }
   
   // 初始化分页控件事件
   function initPaginationControls() {
    // 首页按钮
    document.getElementById('firstPageBtn').addEventListener('click', () => {
     if (state.currentPage > 1) {
      state.currentPage = 1;
      document.getElementById('currentPageInput').value = 1;
      renderTableData();
      updatePaginationInfo();
     }
    });
    
    // 上一页按钮
    document.getElementById('prevPageBtn').addEventListener('click', () => {
     if (state.currentPage > 1) {
      state.currentPage--;
      document.getElementById('currentPageInput').value = state.currentPage;
      renderTableData();
      updatePaginationInfo();
     }
    });
    
    // 下一页按钮
    document.getElementById('nextPageBtn').addEventListener('click', () => {
     const totalPages = Math.ceil(state.totalItems / state.pageSize);
     if (state.currentPage < totalPages) {
      state.currentPage++;
      document.getElementById('currentPageInput').value = state.currentPage;
      renderTableData();
      updatePaginationInfo();
     }
    });
    
    // 末页按钮
    document.getElementById('lastPageBtn').addEventListener('click', () => {
     const totalPages = Math.ceil(state.totalItems / state.pageSize);
     if (state.currentPage < totalPages) {
      state.currentPage = totalPages;
      document.getElementById('currentPageInput').value = state.currentPage;
      renderTableData();
      updatePaginationInfo();
     }
    });
    
    // 页码输入框
    document.getElementById('currentPageInput').addEventListener('change', function() {
     let page = parseInt(this.value);
     const totalPages = Math.ceil(state.totalItems / state.pageSize);
     
     if (isNaN(page) || page < 1) {
      page = 1;
     } else if (page > totalPages) {
      page = totalPages;
     }
     
     state.currentPage = page;
     this.value = page;
     renderTableData(); 
     updatePaginationInfo();
    });
    
    // 每页条数选择框
    document.getElementById('pageSizeSelect').addEventListener('change', function() {
     state.pageSize = parseInt(this.value);
     state.currentPage = 1;
     document.getElementById('currentPageInput').value = 1;
     renderTableData();
     updatePaginationInfo();
    });
   }

   function initTableSearch() {
    const searchInput = document.getElementById('tableSearchInput');
    searchInput.addEventListener('input', function() {
     state.searchTerm = this.value.toLowerCase(); 
     state.currentPage = page;
     document.getElementById('currentPageInput').value = 1;
     applySearch();
     renderTableData();
     updatePaginationInfo();
    });
   }
   
   // 应用搜索
   function applySearch() {
    // 如果没有搜索词，直接使用筛选后的数据
    if (!state.searchTerm) {
     return;
    }
    
    // 否则应用搜索过滤
    const searchResults = state.filteredData.filter(item => {
     // 检查所有字段是否包含搜索词
     return Object.values(item).some(value => {
      return value.toString().toLowerCase().includes(state.searchTerm);
     });
    });
    
    // 更新总记录数
    state.totalItems = searchResults.length;
    document.getElementById('totalCount').textContent = `共 ${state.totalItems} 条记录`;
   }
   
   // 渲染表格数据
   function renderTableData() {
    const tableBody = document.getElementById('dataTableBody');
    
    // 复制筛选后的数据以避免修改原始数据
    let dataToRender = [...state.filteredData];
    
    // 应用搜索
    if (state.searchTerm) {
     dataToRender = dataToRender.filter(item => {
      return Object.values(item).some(value => {
       return value.toString().toLowerCase().includes(state.searchTerm);
      });
     });
    }
    
    // 应用排序
    if (state.sortField) {
     dataToRender.sort((a, b) => {
      const valueA = a[state.sortField];
      const valueB = b[state.sortField];
      
      // 根据数据类型进行比较
      if (typeof valueA === 'number' && typeof valueB === 'number') {
       return state.sortDirection === 'asc' ? valueA - valueB : valueB - valueA;
      } else {
       const strA = valueA.toString().toLowerCase();
       const strB = valueB.toString().toLowerCase();
       return state.sortDirection === 'asc' 
        ? strA.localeCompare(strB) 
        : strB.localeCompare(strA);
      }
     });
    }
    
    // 应用分页
    const startIndex = (state.currentPage - 1) * state.pageSize; 
    const endIndex = Math.min(startIndex + state.pageSize, dataToRender.length);
    const paginatedData = dataToRender.slice(startIndex, endIndex);
    
    // 清空表格
    tableBody.innerHTML = '';
    
    // 如果没有数据
    if (paginatedData.length === 0) {
     tableBody.innerHTML = `

`;

            <td class="px-6 py-4 whitespace-nowrap text-sm">${item.admissionDate}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm">${item.dischargeDate}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">￥${item.totalCost.toFixed(2)}</td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-primary">￥${item.reimbursement.toFixed(2)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">${item.diagnosisCode}</td>
                      <td class="px-6 py-4 whitespace-nowrap text-sm">${item.diagnosisName}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">${item.settlementDate}</td>
                          <td class="px-6 py-4 whitespace-nowrap text-sm">${item.insuranceUnit}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">${item.insuranceType}</td>
                              
                              
                              
                              
                              
                            `;
     
     tableBody.appendChild(row);
    });
    
    // 更新排序图标
    updateSortIcons();
   }
   
   // 更新分页信息
   function updatePaginationInfo() {
    const totalPages = Math.ceil(state.totalItems / state.pageSize);
    const startItem = state.totalItems > 0 ? (state.currentPage - 1) * state.pageSize + 1 : 0;
    const endItem = Math.min(state.currentPage * state.pageSize, state.totalItems);
    
    // 更新分页信息文本
    document.getElementById('pageRange').textContent = `${startItem}-${endItem}`;
    document.getElementById('paginationTotal').textContent = state.totalItems;
    document.getElementById('totalPages').textContent = totalPages;
    
    // 更新分页按钮状态
    document.getElementById('firstPageBtn').disabled = state.currentPage <= 1 || state.totalItems === 0;
    document.getElementById('prevPageBtn').disabled = state.currentPage <= 1 || state.totalItems === 0;
    document.getElementById('nextPageBtn').disabled = state.currentPage >= totalPages || state.totalItems === 0;
    document.getElementById('lastPageBtn').disabled = state.currentPage >= totalPages || state.totalItems === 0;
   }
   
   // 初始化页面
   document.addEventListener('DOMContentLoaded', () => {
    initDistrictSelect();
    initQueryButton();
    initResetButton();
    initTableSorting();
    initPaginationControls();
    initTableSearch();
    
    // 页面加载完成后自动执行查询以显示数据
    performQuery();
   });
  </script>   
 </body>
</html>
