            const totalFund = mockData.tableData.reduce((sum, item) => sum + item.fundAmount, 0);
            document.getElementById('totalFund').textContent = `¥${totalFund.toLocaleString()}`;
            
            // 计算总住院人次

        // 绑定事件监听器
        function bindEventListeners() {

            
            // 查询按钮点击事件
            document.getElementById('searchBtn').addEventListener('click', function() {
                // 模拟加载状态
                this.innerHTML = `






<i class="fas fa-spinner fa-spin mr-2">
</i>查询中...






`;
                this.disabled = true;
                
                // 模拟查询延迟
                setTimeout(() => {
                    // 恢复按钮状态
                    this.innerHTML = `






<i class="fas fa-search mr-2">
</i>查询数据






`;
                    this.disabled = false;
                    
                    // 这里可以根据筛选条件重新渲染表格数据
                    // 目前使用模拟数据
                    renderTableData(mockData.tableData);
                    updateSummaryStatistics();
                    
                    // 显示成功提示
                    showNotification('查询成功', 'success');
                }, 800);
            });
            
// 重置按钮点击事件
            document.getElementById('resetBtn').addEventListener('click', function() {
                document.getElementById('filterForm').reset();
            });
            
            // 关闭模态框按钮事件
            document.getElementById('closeModal').addEventListener('click', function() {
                document.getElementById('detailModal').classList.add('hidden');
            });
            
            // 确认关闭模态框按钮事件
            document.getElementById('confirmModal').addEventListener('click', function() {
                document.getElementById('detailModal').classList.add('hidden');
            });
            
            // 点击模态框外部关闭
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.add('hidden');
                }
            });
        }
        // 显示通知提示
        function showNotification(message, type = 'info') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full z-50 flex items-center`;
            
            // 根据类型设置样式
            switch(type) {
                case 'success':
                    notification.classList.add('bg-success', 'text-white');
                    notification.innerHTML = `






<i class="fas fa-check-circle mr-2">
</i>${message}






`;
                    break;
                case 'error':
                    notification.classList.add('bg-danger', 'text-white');
                    notification.innerHTML = `






<i class="fas fa-exclamation-circle mr-2">
</i>${message}






`;
                    break;
                case 'warning':
                    notification.classList.add('bg-warning', 'text-white');
                    notification.innerHTML = `






<i class="fas fa-exclamation-triangle mr-2">
</i>${message}






`;
                    break;
                default:
                    notification.classList.add('bg-primary', 'text-white');
                    notification.innerHTML = `






<i class="fas fa-info-circle mr-2">
</i>${message}






`;
            }
            
            // 添加到页面
            document.body.appendChild(notification);
            
            // 显示通知
            setTimeout(() => {
                notification.classList.remove('translate-x-full');
            }, 10);
            
            // 3秒后自动关闭
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }
  </script>
