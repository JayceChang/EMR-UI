        // 渲染趋势图表
        function renderTrendCharts(dimensionName) {

                avgCostTrendChart.clear();
                avgDaysTrendChart.clear();

                avgCostTrendChart.showLoading({ text: '暂无数据' });
                avgDaysTrendChart.showLoading({ text: '暂无数据' });
                return;

                patientsTrendChart.hideLoading();
                avgCostTrendChart.hideLoading();
                avgDaysTrendChart.hideLoading();
            }
            // 住院人次数趋势
            patientsTrendChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: trendData.months },
                yAxis: { type: 'value', name: '人次' },
                series: [{
                    name: '住院人次',
                    type: 'line',
                    data: trendData.patients,
                    smooth: true,
                    lineStyle: { color: '#4F46E5' },
                    itemStyle: { color: '#4F46E5' }
                }]
            });
            // 次均费用趋势

        // 根据筛选条件获取数据并渲染
function fetchDataAndRender() {
            const analysisType = analysisTypeSelect.value;
            const groupBy = groupBySelect.value; // 实际应用中会根据这个参数从后端获取不同维度的数据
            const searchKeyword = searchKeywordInput.value.toLowerCase();
            const hospitalLevel = hospitalLevelSelect.value;
            const medicalInstitutionName = medicalInstitutionNameInput.value.toLowerCase();
            let currentData = [];
            if (analysisType === 'icd10Category') {
                currentData = mockData.icd10Category;
            } else if (analysisType === 'icd10SubCategory') {
                currentData = mockData.icd10SubCategory;
            } else if (analysisType === 'icdDiagnosis') {
                currentData = mockData.icdDiagnosis;
            }
            // 模拟搜索过滤和新增筛选条件
            const filteredData = currentData.filter(item => {
                const matchesKeyword = item.name.toLowerCase().includes(searchKeyword);
                // 模拟医院级别和医疗机构名称筛选，实际应从后端获取数据时进行过滤
                const matchesHospitalLevel = hospitalLevel === '' || true; // 模拟，实际应根据数据中的医院级别字段判断
                const matchesMedicalInstitution = medicalInstitutionName === '' || true; // 模拟，实际应根据数据中的医疗机构名称字段判断
                return matchesKeyword && matchesHospitalLevel && matchesMedicalInstitution;
            });
            // 渲染汇总表格
            renderSummaryTable(filteredData, analysisType);
            // 渲染趋势图表 (默认取第一个分类的数据进行展示)
            if (filteredData.length > 0) {
                renderTrendCharts(filteredData[0].name);
            } else {
                renderTrendCharts(null); // 清空图表
            }
            // 渲染外转患者表格
            let outpatientCurrentData = [];
            if (analysisType === 'icd10Category') {
                outpatientCurrentData = mockData.outpatient.icd10Category;
            } else if (analysisType === 'icd10SubCategory') {
                outpatientCurrentData = mockData.outpatient.icd10SubCategory;
            } else if (analysisType === 'icdDiagnosis') {
                outpatientCurrentData = mockData.outpatient.icdDiagnosis;
            }
            const filteredOutpatientData = outpatientCurrentData.filter(item => {
                const matchesKeyword = item.name.toLowerCase().includes(searchKeyword);
                const matchesHospitalLevel = hospitalLevel === '' || true;
                const matchesMedicalInstitution = medicalInstitutionName === '' || true;
                return matchesKeyword && matchesHospitalLevel && matchesMedicalInstitution;
            });
            renderOutpatientTable(filteredOutpatientData, analysisType);
        }
        // 切换Tab
        function switchTab(activeTabId) {
            // 移除所有tab按钮的激活样式
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('border-blue-500', 'text-blue-600');
                button.classList.add('border-transparent', 'text-gray-500', 'hover:border-gray-300', 'hover:text-gray-700');
            });
            // 隐藏所有tab内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            // 激活当前tab按钮
            const activeTabButton = document.getElementById(activeTabId);
            activeTabButton.classList.add('border-blue-500', 'text-blue-600');
            activeTabButton.classList.remove('border-transparent', 'text-gray-500', 'hover:border-gray-300', 'hover:text-gray-700');
            // 显示当前tab内容
            if (activeTabId === 'tabSummary') {
                summaryContent.classList.remove('hidden');
            } else if (activeTabId === 'tabTrend') {
                trendContent.classList.remove('hidden');
                // 确保图表在显示时正确渲染
                if (patientsTrendChart) patientsTrendChart.resize();
                if (avgCostTrendChart) avgCostTrendChart.resize();
                if (avgDaysTrendChart) avgDaysTrendChart.resize();
            } else if (activeTabId === 'tabOutpatient') {
                outpatientContent.classList.remove('hidden');
            }
        }
        // 页面加载时初始化渲染
        document.addEventListener('DOMContentLoaded', () => {
            initCharts(); // 初始化ECharts实例
            fetchDataAndRender(); // 首次加载数据
            switchTab('tabSummary'); // 默认显示汇总分析
            // 事件监听
            applyFiltersButton.addEventListener('click', fetchDataAndRender);
            resetFiltersButton.addEventListener('click', () => {
                analysisTypeSelect.value = 'icd10Category';
                groupBySelect.value = 'city';
startDateInput.value = '';
                endDateInput.value = '';
                searchKeywordInput.value = '';
                hospitalLevelSelect.value = '';
                medicalInstitutionNameInput.value = '';
                fetchDataAndRender();
            });
            tabSummary.addEventListener('click', () => switchTab('tabSummary'));
            tabTrend.addEventListener('click', () => switchTab('tabTrend'));
            tabOutpatient.addEventListener('click', () => switchTab('tabOutpatient'));
            // 监听分析维度变化，更新表格表头
            analysisTypeSelect.addEventListener('change', () => {
                tableHeaderDimension.textContent = analysisTypeSelect.options[analysisTypeSelect.selectedIndex].text;

            // 窗口大小改变时重绘图表

                if (avgDaysTrendChart) avgDaysTrendChart.resize();
            });
